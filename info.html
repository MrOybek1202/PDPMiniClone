<body>
	<aside>

			<div class="navs">

				</ul>
			</div>
			<div class="circle-main">
				<h1>IMTIHONGA <br>RO’YXATDAN <br>O’TISH</h1>
			</div>
			</div>
			<span class="circle circle-1"></span>
			<span class="circle circle-2"></span>

	<div class="info-foto">
		<img src="https://picsum.photos/1920/1080?random=1" alt="1">
		<img src="https://picsum.photos/1920/1080?random=2" alt="2">
		<img src="https://picsum.photos/1920/1080?random=3" alt="3">
	</div>






	<script>
		const container = document.querySelector('.info-foto')

		container.addEventListener('wheel', function (e) {
			e.preventDefault()

			// Если скроллят вбок — игнорируем
			if (e.deltaX !== 0) return

			// Если вверх/вниз — двигаем вбок
			container.scrollLeft += e.deltaY
		}, { passive: false })
	</script>
